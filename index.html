<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>playWeb</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
  <script src="https://kit.fontawesome.com/ac0b6d6bc8.js" crossorigin="anonymous"></script>
  <link rel="stylesheet" href="style.css" />
</head>

<body>
  <audio id="audio" src="###"></audio>
  <div class="d-flex align-items-center" style="height: 100vh">
    <div id="controlPanel" class="container text-center">

      <!-- 下拉式選單 -->
      <select id="selectElement">
        <!-- js 生成資料 -->
      </select>

      <!-- 曲目歌手進度條 -->
      <div class="row">
        <div id="showDetailText" style="cursor: default;">歡迎使用我的播放器</div>
        <div class="col-12">
          <input id="progressBar" class="col-6 mx-auto " type="range" value="0" />
        </div>
        <div class="row col-6 mx-auto">
          <div id="showNowTime" class="col-6" style="text-align: left">
            00:00
          </div>
          <div id="showSongTime" class="col-6" style="text-align: right">
            00:00
          </div>
        </div>

        <div id="showStatus" style="cursor: default;">依序播放</div>
      </div>

      <!-- 功能按鈕 一區-->
      <div class="row  col-6 mx-auto">
        <!-- <div class="selectBtn"> -->
        <div class="col-2 d-flex justify-content-start">
          <button id="list" class="fa-solid fa-list fa-2x nbtn"></button>
          <div id="overlayList" class="justify-content-center align-items-center">
            <div id="popupList" class="row ">
              <div id="popupListUp" class="px-3 py-3 "></div>
              <div class="custom-hr"></div>
              <div class=" d-flex justify-content-between px-3 py-2">
                <button id="addPopList">＋新增歌曲</button>
                <button id="closePopList">取消</button>
              </div>
            </div>
          </div>

        </div>

        <!-- 整合 -->
        <div class="col-2 d-flex justify-content-start ">
          <button id="orderSong" class="fa-solid fa-right-long fa-2x nbtn"></button>
        </div>
        <div class="col-2 d-flex justify-content-end">
          <button id="repeatSong" class="fa-solid fa-redo fa-2x nbtn "></button>
        </div>
        <div class="col-2 d-flex justify-content-end">
          <button id="randomSong" class="fa-solid fa-shuffle fa-2x nbtn "></button>
        </div>
        <!-- 整合 -->
        <div class="col-2 d-flex justify-content-end">
          <button id="repeatList" class="fa-solid fa-retweet fa-2x nbtn"></button>
        </div>
        <div class="col-2 d-flex justify-content-end">
          <button id="tool" class="fa-solid fa-gear fa-2x nbtn "></button>
        </div>
      </div>

      <!-- 功能按鈕 二區-->
      <div class="row  col-6 mx-auto align-items-center">
        <div class="col d-flex ">
          <button id="setMute" class="fa-solid fa-volume-up fa-2x mbtn"></button>
          <!-- 彈出視窗 -->
          <div id="popupWindow" class="volumePopup">
            <input id="showVolume" type="text" class="text" readonly />
            <button id="clickVolumeUp" class="ipt">
              <i class="fa-solid fa-plus "></i>
            </button>
            <div class="cen">
              <input id="setVolume" type="range" value="30" />
            </div>
            <button id="clickVolumeDown" class="ipt">
              <i class="fa-solid fa-minus"></i>
            </button>
          </div>
        </div>
        <div class="col d-flex ">
          <button id="prevSong" class="fa-solid fa-forward-step fa-rotate-180 fa-2x mbtn"></button>
        </div>
        <div class="col d-flex ">
          <button id="prevTime" class="fa-solid fa-backward fa-2x mbtn"></button>
        </div>
        <div class="col d-flex justify-content-center">
          <img id="playStopBtn" class="sbtn" src="files/play_top_icon/play.svg" alt="Play Button" />
        </div>
        <div class="col d-flex justify-content-end">
          <button id="nextTime" class="fa-solid fa-backward fa-rotate-180 fa-2x mbtn"></button>
        </div>
        <div class="col d-flex justify-content-end">
          <button id="nextSong" class="fa-solid fa-forward-step fa-2x mbtn"></button>
        </div>
        <div class="col d-flex justify-content-end">
          <button id="replayBtn" class="fa-solid fa-stop fa-2x mbtn"></button>
        </div>
      </div>


      <!-- 彈跳視窗 ==> 滑鼠未移動過久 -->
      <div id="overlay">
        <div id="popup">
          <h2>閒置過久</h2>
          <p>請問要繼續播放嗎?</p>
          <button id="closePop">暫停</button>
          <button id="closePopPly">播放</button>
        </div>
      </div>


    </div>

    <script src="script.js"></script>
</body>

</html>
