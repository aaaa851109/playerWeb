<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
    <script src="https://kit.fontawesome.com/ac0b6d6bc8.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="test.css" />
</head>

<body class="d-flex align-items-center container" style="height:100vh ">
    <div>
        <button id=" setMute" class="fa-solid fa-volume-up fa-2x mbtn"></button>
        <!-- 彈出視窗 -->
        <div id="popupWindow" class="volumePopup">
            <input id="showVolume" type="text" class="text" readonly />
            <button id="clickVolumeUp" class="ipt">
                <i class="fa-solid fa-plus "></i>
            </button>
            <div class="range">
                <input id="setVolume" type="range" value="30" />
            </div>
            <button id="clickVolumeDown" class="ipt">
                <i class="fa-solid fa-minus"></i>
            </button>
        </div>
    </div>
</body>

</html>
