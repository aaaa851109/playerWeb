<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous" />
    <script src="https://kit.fontawesome.com/ac0b6d6bc8.js" crossorigin="anonymous"></script>
    <link rel="stylesheet" href="style.css" />

    <style>
        /* 簡單的輪播按鈕樣式 */
        #carousel {
            position: relative;
            width: 100px;
            height: 100px;
        }

        #carouselButton {
            width: 100%;
            height: 100%;
            background-color: transparent;
            border: none;
            outline: none;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>


</head>

<body>
    <div class="col-2 d-flex justify-content-start ">
        <button id="orderSong" class="fa-solid fa-right-long fa-2x nbtn"></button>
    </div>
    <div class="col-2 d-flex justify-content-end">
        <button id="repeatSong" class="fa-solid fa-redo fa-2x nbtn "></button>
    </div>
    <div class="col-2 d-flex justify-content-end">
        <button id="randomSong" class="fa-solid fa-shuffle fa-2x nbtn "></button>
    </div>



    <div id="carousel" class="d-flex justify-content-center align-items-center">
        <button id="carouselButton" class="fa-solid fa-right-long fa-2x nbtn"></button>
    </div>

    <script>
        const carouselButton = document.getElementById("carouselButton");

        // 定義圖示類別與功能
        const icons = [
            { icon: "fa-right-long", action: orderSong },
            { icon: "fa-redo", action: repeatSong },
            { icon: "fa-shuffle", action: randomSong },
        ];

        let currentIndex = 0;

        // 切換按鈕圖示及功能
        function updateButton() {
            carouselButton.className = `fa-solid ${icons[currentIndex].icon} fa-2x nbtn`;
        }

        function orderSong() {
            console.log("Order song");
            // 實際執行排序播放的功能
        }

        function repeatSong() {
            console.log("Repeat song");
            // 實際執行重複播放的功能
        }

        function randomSong() {
            console.log("Random song");
            // 實際執行隨機播放的功能
        }

        // 點擊按鈕切換圖示和執行功能
        carouselButton.addEventListener("click", () => {
            icons[currentIndex].action(); // 執行當前功能
            currentIndex = (currentIndex + 1) % icons.length; // 切換到下一個
            updateButton(); // 更新圖示
        });

        // 初始化按鈕
        updateButton();

    </script>
</body>

</html>
